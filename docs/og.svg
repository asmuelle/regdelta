<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" font-family="'Inter','Helvetica Neue',Arial,sans-serif">
  <rect width="1200" height="630" fill="#FFFFFF"/>

  <!-- top + bottom hairlines -->
  <rect x="0" y="0" width="1200" height="10" fill="#0A0A0A"/>
  <rect x="0" y="620" width="1200" height="10" fill="#0A0A0A"/>

  <!-- masthead -->
  <g transform="translate(72,78)">
    <rect width="30" height="30" fill="#0A0A0A"/>
    <rect x="6" y="8" width="12" height="2.6" fill="#FF2D1A"/>
    <rect x="6" y="14" width="18" height="2.6" fill="#F2F2F2"/>
    <rect x="6" y="20" width="14" height="2.6" fill="#F2F2F2"/>
    <text x="44" y="23" font-size="27" font-weight="900" letter-spacing="-1.5" fill="#0A0A0A">Reg<tspan fill="#FF2D1A">Delta</tspan></text>
  </g>
  <text x="1128" y="98" text-anchor="end" font-family="'IBM Plex Mono',monospace" font-size="15" letter-spacing="3" fill="#6A6A6A">REGULATORY · CHANGE · MGMT</text>

  <!-- headline -->
  <g transform="translate(72,200)">
    <text font-size="74" font-weight="900" letter-spacing="-3.5" fill="#0A0A0A">
      <tspan x="0" y="0">Know <tspan fill="#FF2D1A" text-decoration="line-through">nothing</tspan> exactly</tspan>
      <tspan x="0" y="86">what changed.</tspan>
    </text>
    <!-- manual strike line over "nothing" for renderers ignoring text-decoration -->
    <rect x="171" y="-24" width="158" height="6" fill="#FF2D1A"/>
    <text x="0" y="150" font-size="26" font-weight="500" letter-spacing="-0.4" fill="#3A3A3A">
      A living, citation-pinned obligation map for SME compliance teams.
    </text>
    <text x="0" y="186" font-size="26" font-weight="500" letter-spacing="-0.4" fill="#3A3A3A">
      Redline diffs of what changed, who it affects, and the deadline.
    </text>
  </g>

  <!-- redline diff chip -->
  <g transform="translate(72,470)">
    <rect x="0" y="0" width="700" height="92" fill="#FFFFFF" stroke="#0A0A0A" stroke-width="2"/>
    <rect x="700" y="0" width="8" height="92" fill="#FF2D1A"/>
    <text x="22" y="34" font-family="'IBM Plex Mono',monospace" font-size="17" fill="#C01405">
      <tspan font-weight="600">−</tspan>  disclose <tspan text-decoration="line-through">within 30 days</tspan>
    </text>
    <rect x="120" y="22" width="118" height="4" fill="#FF2D1A"/>
    <text x="22" y="66" font-family="'IBM Plex Mono',monospace" font-size="17" fill="#0B7A33">
      <tspan font-weight="600">+</tspan>  disclose within 15 calendar days
    </text>
  </g>

  <!-- effective-date tag -->
  <g transform="translate(820,470)">
    <rect x="0" y="0" width="308" height="92" fill="#0A0A0A"/>
    <text x="20" y="34" font-family="'IBM Plex Mono',monospace" font-size="13" letter-spacing="2" fill="#9A9A9A">EFFECTIVE DATE</text>
    <text x="20" y="66" font-family="'IBM Plex Mono',monospace" font-size="27" font-weight="600" fill="#FFFFFF">2026-08-01</text>
    <circle cx="284" cy="28" r="6" fill="#FF2D1A"/>
  </g>
</svg>
